  <script>
    const theme = localStorage.getItem("theme");
    if (theme === "dark" || (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
      document.documentElement.classList.add("dark");
    } else {
      document.documentElement.classList.remove("dark");
    }

<body>

  <script type="module" src="/src/main.tsx"></script>

  <!-- RECOVERY SCRIPT: Forcing Hard Refresh on Module Load Failure -->
  <script>
    window.addEventListener('error', function (e) {
      if (e.target && e.target.tagName === 'SCRIPT' && e.target.type === 'module') {
        console.warn('Module Load Fault Detected. Triggering Engine Re-alignment...');
        const lastReload = localStorage.getItem('forge-recovery-timestamp');
        const now = Date.now();
        if (!lastReload || now - parseInt(lastReload) > 3000) {
          localStorage.setItem('forge-recovery-timestamp', now.toString());
          window.location.reload(true);
        }
      }
    }, true);
  </script>
