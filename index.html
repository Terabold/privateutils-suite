  <script>
    window.addEventListener('load', () => {
      const runDeferredScripts = () => {
        // 1. Google Analytics
        const gtmScript = document.createElement('script');
        gtmScript.src = "https://www.googletagmanager.com/gtag/js?id=G-QSZPWLTQC2";
        gtmScript.async = true;
        document.head.appendChild(gtmScript);

        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-QSZPWLTQC2');

        // 2. Google AdSense (Lazy loaded to speed up the site)
        const adsenseScript = document.createElement('script');
        adsenseScript.src = "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8938339685834274";
        adsenseScript.crossOrigin = "anonymous";
        adsenseScript.async = true;
        document.head.appendChild(adsenseScript);
      };

      if ('requestIdleCallback' in window) {
        requestIdleCallback(() => {
          setTimeout(runDeferredScripts, 1000);
        });
      } else {
        setTimeout(runDeferredScripts, 2000);
      }
    });
  </script>

  <script>
    const theme = localStorage.getItem("theme");
    if (theme === "dark" || (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
      document.documentElement.classList.add("dark");
    } else {
      document.documentElement.classList.remove("dark");
    }
  </script>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <script>
    window.addEventListener('error', function (e) {
      if (e.target && e.target.tagName === 'SCRIPT' && e.target.type === 'module') {
        console.warn('Module Load Fault Detected. Triggering Engine Re-alignment...');
        const lastReload = localStorage.getItem('forge-recovery-timestamp');
        const now = Date.now();
        if (!lastReload || now - parseInt(lastReload) > 3000) {
          localStorage.setItem('forge-recovery-timestamp', now.toString());
          window.location.reload(true);
        }
      }
    }, true);
  </script>
